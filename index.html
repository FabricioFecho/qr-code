<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code - Sopro da Terra</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    h1 {
      margin-bottom: 20px;
    }

    #qrcode {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
    }

    p {
      margin-top: 20px;
      color: #555;
    }
  </style>
</head>
<body>

  <h1>QR Code - Sopro da Terra</h1>

  <div id="qrcode"></div>

  <p>Escaneie para acessar o site</p>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://sopro-da-terra.onrender.com",
      width: 300,
      height: 300
    });
  </script>

</body>
</html>
