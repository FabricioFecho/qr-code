<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sopro da Terra</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      text-align: center;
      position: relative;
    }

    .qr-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      border-radius: 25px;
    }

    #qrcode {
      z-index: 2;
    }

    .corner {
      position: absolute;
      width: 70px;
      height: 70px;
      border: 12px solid #6b1f1f;
      border-radius: 25px;
      z-index: 1;
    }

    .top-left {
      top: -5px;
      left: -5px;
      border-right: none;
      border-bottom: none;
    }

    .top-right {
      top: -5px;
      right: -5px;
      border-left: none;
      border-bottom: none;
    }

    .bottom-left {
      bottom: -5px;
      left: -5px;
      border-right: none;
      border-top: none;
    }

    .bottom-right {
      bottom: -5px;
      right: -5px;
      border-left: none;
      border-top: none;
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: white;
      border: 5px solid #E67E22;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      z-index: 3;
      font-size: 34px;
      font-weight: bold;
      color: #6b1f1f;
    }

    h1 {
      margin-top: 30px;
      font-size: 42px;
      color: #3a2a20;
    }

    p {
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="qr-wrapper">

      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>

      <div id="qrcode"></div>

      <div class="logo">S</div>

    </div>

    <h1>Sopro da Terra</h1>

    <p>Escaneie para acessar o site</p>

  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://sopro-da-terra.onrender.com",
      width: 300,
      height: 300,
      colorDark: "#E67E22",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
